<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Задача 6</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <div class="page">
      <a href="../index.html" class="back">← Назад</a>

      <div class="card">
        <h1>Задача 6</h1>

        <p class="description">
          Дано масив елементів. Усі елементи, які більші за перший елемент
          помножити на 2
        </p>
      </div>
    </div>
    <script>
      let count = parseInt(prompt("Скільки елементів?"));
      let arr = [];

      for (let i = 0; i < count; i++) {
        let num = parseFloat(prompt("Введіть число"));
        arr.push(num);
      }

      for (let i = 0; i < arr.length; i++) {
        if (arr[i] > arr[0]) {
          arr[i] *= 2;
        }
      }

      document.write(arr);
    </script>
  </body>
</html>
