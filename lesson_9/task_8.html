<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Задача 8</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <div class="page">
      <a href="../index.html" class="back">← Назад</a>

      <div class="card">
        <h1>Задача 8</h1>

        <p class="description">
          Дано масив номерів авто. Сформувати новий масив тих, які починаються
          на «А»
        </p>
      </div>
    </div>
    <script>
      let input = prompt("Введіть номери авто через пробіл");
      let cars = input.split(" ");

      let result = [];

      for (let i = 0; i < cars.length; i++) {
        if (cars[i][0] === "А") {
          result.push(cars[i]);
        }
      }

      document.write(result);
    </script>
  </body>
</html>
